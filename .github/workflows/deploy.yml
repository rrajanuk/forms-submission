name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        env:
          JEST_CACHE_DISABLE: true
      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript build
        run: npm run build

      # Tests skipped - run locally instead for faster CI/CD
      # Run tests locally: npm test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive


      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          
      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd ${{ secrets.VPS_PATH }}

            # Pull latest code
            git pull origin main

            # Backend setup
            npm install --omit=dev
            npm rebuild better-sqlite3  # Rebuild native module for VPS architecture
            npm run build

            # Start/reload backend with PM2 ecosystem config
            pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production

            # Frontend setup
            cd frontend
            npm install
            npm run build

            # Start/reload frontend with PM2 ecosystem config
            cd ..
            pm2 reload frontend/ecosystem.config.js --env production || pm2 start frontend/ecosystem.config.js --env production

            # Save PM2 configuration for auto-restart on reboot
            pm2 save

            # Display status
            pm2 status
          EOF


      - name: Cleanup
        run: rm -f ~/.ssh/deploy_key
