name: Build & Deploy Forms API 

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify schema file copied
        run: |
          test -f dist/db/schema.sql || (echo "❌ schema.sql missing from dist" && exit 1)
          echo "✅ Schema file present in dist"

      - name: Test
        run: npm test --if-present

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "📦 Starting deployment..."
            cd ~/forms/forms-submission

            echo "⬇️  Pulling latest code..."
            git pull origin main

            echo "🔨 Building backend..."
            npm ci
            npm run build

            echo "🗄️  Running database migrations..."
            npm run migrate:prod

            echo "🧹 Pruning dev dependencies..."
            npm prune --omit=dev

            echo "🔄 Restarting backend PM2..."
            pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
            pm2 save

            echo "⏳ Waiting for backend to start..."
            sleep 3

            echo "🏥 Backend health check..."
            curl -sf http://127.0.0.1:3001/health || (echo "❌ Backend health check failed!" && pm2 logs forms-api --lines 20 --err && exit 1)

            echo "🎨 Building frontend..."
            cd frontend
            npm ci
            npm run build

            echo "🔄 Restarting frontend PM2..."
            pm2 reload forms-frontend || pm2 start frontend/ecosystem.config.js --env production
            pm2 save

            echo "⏳ Waiting for frontend to start..."
            sleep 3

            echo "🎯 Frontend health check..."
            curl -sf http://127.0.0.1:3000 > /dev/null || (echo "❌ Frontend health check failed!" && pm2 logs frontend --lines 20 --err && exit 1)

            echo "✅ Deployment successful!"
            echo "📊 PM2 Status:"
            pm2 status
