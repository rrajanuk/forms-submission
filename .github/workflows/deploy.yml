name: Build & Deploy Forms API

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify migration files copied
        run: |
          test -f dist/db/schema.sql || (echo "❌ schema.sql missing from dist" && exit 1)
          ls dist/db/migrations/*.sql > /dev/null 2>&1 || (echo "❌ Migration SQL files missing from dist" && exit 1)
          echo "✅ All SQL files present in dist"

      - name: Test
        run: npm test --if-present

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "📦 Starting deployment..."
            cd ~/forms/forms-submission

            echo "⬇️  Pulling latest code..."
            git pull origin main

            echo "📥 Installing dependencies..."
            npm ci

            echo "🔨 Building..."
            npm run build

            echo "🧹 Pruning dev dependencies..."
            npm prune --omit=dev

            echo "🔄 Restarting PM2..."
            pm2 restart forms-api || pm2 start ecosystem.config.js
            pm2 save

            echo "⏳ Waiting for app to start..."
            sleep 3

            echo "🏥 Health check..."
            curl -sf http://127.0.0.1:4000/health || (echo "❌ Health check failed!" && pm2 logs forms-api --lines 20 --err && exit 1)

            echo "✅ Deployment successful"
            pm2 status
